<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MCH Tap Battle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="screen-title" class="screen active">
    <img id="title-logo" src="Image/Icons/mch_logo_horizontal.png" alt="MCH">
    <h1>TAP BATTLE</h1>
    <p>PHYとINTを駆使して敵を倒せ！</p>
    <button id="btn-start" class="btn">START</button>
  </div>

  <div id="screen-game" class="screen">
    <div id="hud">
      <div id="hud-score">撃破: <span id="score">0</span></div>
      <div id="hud-right"><span id="timer">60</span>s</div>
    </div>

    <div id="battle-field">
      <div id="player-side">
        <div class="char-name" id="hero-name">—</div>
        <img id="hero-img" src="" alt="Hero">
        <div class="hp-bar-wrap">
          <div class="hp-bar-fill" id="player-hp-fill"></div>
        </div>
        <div id="player-stats">
          <span class="stat-chip phy">PHY <b id="stat-phy">0</b></span>
          <span class="stat-chip int">INT <b id="stat-int">0</b></span>
        </div>
      </div>

      <div id="enemy-side">
        <div class="char-name" id="enemy-name">—</div>
        <div id="enemy-wrap">
          <img id="enemy-img" src="" alt="Enemy">
          <div id="effect-sprite"></div>
        </div>
        <div class="hp-bar-wrap">
          <div class="hp-bar-fill" id="enemy-hp-fill"></div>
        </div>
        <div id="enemy-stats">
          <span class="stat-chip phy">PHY <b id="enemy-phy-val">0</b></span>
          <span class="stat-chip int">INT <b id="enemy-int-val">0</b></span>
          <span id="weak-badge">—</span>
        </div>
      </div>
    </div>

    <div id="passive-area">
      <span id="passive-name"></span>
      <span id="passive-desc"></span>
    </div>

    <div id="passive-pop"></div>

    <div id="action-area">
      <button id="btn-phy" class="attack-btn phy-btn">
        <div class="btn-icon">PHY</div>
        <div class="btn-sub">物理攻撃</div>
      </button>
      <button id="btn-skill" class="skill-btn">
        <div id="skill-gauge-fill"></div>
        <span id="skill-btn-text">SKILL 0/5</span>
      </button>
      <button id="btn-int" class="attack-btn int-btn">
        <div class="btn-icon">INT</div>
        <div class="btn-sub">魔法攻撃</div>
      </button>
    </div>
  </div>

  <div id="screen-result" class="screen">
    <h2>BATTLE END</h2>
    <div id="result-number"><span id="result-score">0</span></div>
    <div id="result-label">体撃破！</div>
    <button id="btn-retry" class="btn">もう一度</button>
  </div>

  <script src="game.js"></script>
</body>
</html>
